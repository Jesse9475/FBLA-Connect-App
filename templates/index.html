<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FBLA Connect - Auth</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body data-supabase-url="{{ supabase_url }}" data-supabase-anon="{{ supabase_anon_key }}">
    <main class="container">
      <h1>FBLA Connect</h1>
      <p>Magic link sign-in for Supabase Auth.</p>

      <div class="card">
        <h2>Sign In</h2>
        <label>Email</label>
        <input id="email" type="email" placeholder="you@example.com" />
        <button id="sendLink">Send Magic Link</button>
        <p id="authStatus" class="muted"></p>
      </div>

      <div class="card">
        <h2>Session</h2>
        <button id="checkSession">Check Session</button>
        <button id="signOut">Sign Out</button>
        <pre id="sessionOutput"></pre>
      </div>

      <a href="/dashboard">Go to dashboard</a>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
